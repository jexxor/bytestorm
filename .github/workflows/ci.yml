name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Install Protoc Plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.1

      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --default=none -E ineffassign -E unused --timeout=5m

      - name: Check Proto Generation
        run: |
          go generate ./...

          if ! git diff --quiet --exit-code; then
            echo "Generated code is out of date. Run 'go generate ./...' and commit the changes."
            git status --short
            git --no-pager diff
            exit 1
          fi

      - name: Run Tests
        run: go test ./...

      - name: Vet
        run: go vet ./...
